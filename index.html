<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kompüter Masaüstü</title>
    <link rel="stylesheet" href="./CSS/style.css">
</head>
<body>

<div class="pc-screen">
    <div id="entranceOverlay" class="entrance-overlay">
        <div class="entrance-content">
            <div class="entrance-logo">
                <img src="./CSS/Images/Adobe Express - file.png" alt="Sistem Loqosu">
            </div>
            <div class="tutorial-section">
                <p class="label">Kiber-Müdafiə Təlimi</p>
                <a href="https://www.instagram.com/reel/DVbx-nuiMz3/?igsh=MWZqc3J6NWp5bHZqdg==" target="_blank" class="tutorial-link">Təlimat: Bələdçiyə Bax</a>
            </div>
            <button id="startSystemBtn" class="start-button">Sistemi Başlat</button>
        </div>

        <div id="bootSequence" class="boot-sequence hidden">
            <div id="typewriterTarget"></div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>
    </div>

    <canvas id="binaryCanvas"></canvas>

    <div class="desktop" id="desktop">

        <div class="folder-icon folder1" data-folder="1">
            <div class="icon-img"></div>
            <span class="folder-name">Keçidlər</span>
            <div class="notification-badge" id="notification-folder1">1</div>
        </div>

        <div class="folder-icon folder2" data-folder="2">
            <div class="icon-img"></div>
            <span class="folder-name">Şifrə</span>
            <div class="notification-badge" id="notification-folder2">1</div>
        </div>

        <div class="folder-icon folder3" data-folder="3">
            <div class="icon-img"></div>
            <span class="folder-name">Təlimatlar</span>
            <div class="notification-badge" id="notification-folder3">1</div>
        </div>

    </div>
</div>

<div class="score-container">
    <div class="score-box">
        <span class="score-label">Xal</span>
        <span class="score-value" id="scoreDisplay">0</span>
    </div>
</div>

<div id="gameOverScreen" class="game-over hidden">
    <div class="game-over-content">
        <div class="game-over-title">UDUZDUN ÇÜNKİ:</div>
        <div class="game-over-reason" id="gameOverReason"></div>
    </div>
</div>

<audio id="errorSound" preload="auto">
    <source src="./CSS/Audio/Windows Error Meme (mp3cut.net).mp3" type="audio/mpeg">
</audio>
<audio id="notificationSound" preload="auto">
    <source src="./CSS/Audio/dragon-studio-notification-sound-effect-372475.mp3" type="audio/mpeg">
</audio>

<script src="./javascript/database.js"></script>
<script src="./javascript/binary-bg.js"></script>
<script src="./javascript/script.js"></script>

</body>
</html>
